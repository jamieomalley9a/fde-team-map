            padding: 0;
            box-sizing: border-box;

        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #141419;
            --bg-card-hover: #1a1a22;
            --accent-red: #eb1700;
            --accent-red-glow: rgba(235, 23, 0, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(235, 23, 0, 0.3);
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 24px 32px;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.95) 0%, rgba(10, 10, 15, 0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-left h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .header-left h1 span {
            color: var(--accent-red);
        }

        .header-left p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-stats {
            display: flex;
            gap: 32px;
        }

        .stat {
            text-align: right;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 4px;
        }

        /* Cluster markers */
        .cluster-marker {
            background: var(--accent-red);
            border: 3px solid var(--bg-dark);
            border-radius: 50%;
            color: white;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px var(--accent-red-glow), 0 0 0 0 var(--accent-red-glow);
            animation: pulse 2s infinite;
        }

        .cluster-marker:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 30px var(--accent-red-glow);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px var(--accent-red-glow), 0 0 0 0 var(--accent-red-glow); }
            50% { box-shadow: 0 4px 20px var(--accent-red-glow), 0 0 0 8px rgba(235, 23, 0, 0); }

        /* Single marker */
        .single-marker {
            width: 16px;
            height: 16px;
            background: var(--accent-red);
            border: 3px solid var(--bg-dark);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px var(--accent-red-glow);
        }

        .single-marker:hover {

            background: var(--bg-card) !important;
            border: 1px solid var(--border-subtle) !important;
            border-radius: 10px !important;
            overflow: hidden;

        .mapboxgl-ctrl-group button {
            background: var(--bg-card) !important;
            border-color: var(--border-subtle) !important;
        }

        .mapboxgl-ctrl-group button:hover {
            background: var(--bg-card-hover) !important;
        }

        .mapboxgl-ctrl-group button .mapboxgl-ctrl-icon {
            filter: invert(1);

        /* Error state */
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            border: 1px solid var(--accent-red);
            border-radius: 12px;
            padding: 24px 32px;
            text-align: center;
            z-index: 9999;
        }

        .error-message h2 {
            color: var(--accent-red);
            margin-bottom: 8px;
        }

        .error-message p {
            color: var(--text-secondary);
            font-size: 14px;
        }

</head>

        // Parse CSV
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/['"]/g, ''));
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index] || '';
                });
                
                if (row.name) {
                    data.push(row);
                }
            }
            
            return data;
        }

        // Process team data
        function processTeamData(rawData) {
            return rawData.map(row => {
                const cityKey = (row.city || '').toLowerCase().trim();
                const coords = cityCoordinates[cityKey] || { lat: 51.5074, lng: -0.1278 };
                
                const languages = (row.languages || 'English')
                    .split(',')
                    .map(l => l.trim())
                    .filter(l => l.length > 0);
                
                return {
                    name: row.name || 'Unknown',
                    role: row.role || 'Team Member',
                    city: row.city || 'London',
                    country: row.country || 'United Kingdom',
                    languages: languages,
                    photo_url: row.photo_url || '',
                    lat: coords.lat,
                    lng: coords.lng
                };
            });
        }

        // Get initials from name
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
        }

        // Create popup HTML for a single member
        function createMemberPopup(member) {
            const languagesHtml = member.languages.map(lang => {
                const flag = languageFlags[lang.toLowerCase()] || '🌐';
                return `<div class="language-tag">
                    <span class="language-flag">${flag}</span>
                    ${lang}
                </div>`;
            }).join('');

            const avatarContent = member.photo_url 
                ? `<img src="${member.photo_url}" alt="${member.name}" onerror="this.parentElement.innerHTML='${getInitials(member.name)}'">`
                : getInitials(member.name);

            return `
                <div class="popup-content">
                    <div class="popup-header">
                        <div class="popup-avatar">${avatarContent}</div>
                        <div>
                            <div class="popup-name">${member.name}</div>
                            <div class="popup-role">${member.role}</div>
                        </div>
                    </div>
                    <div class="popup-divider"></div>
                    <div class="popup-section">
                        <div class="popup-section-label">Location</div>
                        <div class="popup-location">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path fill-rule="evenodd" d="m11.54 22.351.07.04.028.016a.76.76 0 0 0 .723 0l.028-.015.071-.041a16.975 16.975 0 0 0 1.144-.742 19.58 19.58 0 0 0 2.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 0 0-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 0 0 3.828 3.025ZM12 11.25a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd" />
                            </svg>
                            ${member.city}, ${member.country}
                        </div>
                    </div>
                    <div class="popup-section">
                        <div class="popup-section-label">Languages</div>
                        <div class="popup-languages">${languagesHtml}</div>
                    </div>
                </div>
            `;
        }

        // Create popup HTML for a city with multiple members
        function createCityPopup(cityData) {
            const membersHtml = cityData.members.map(member => {
                const flagsHtml = member.languages.map(lang => languageFlags[lang.toLowerCase()] || '🌐').join('');
                const avatarContent = member.photo_url 
                    ? `<img src="${member.photo_url}" alt="${member.name}" onerror="this.parentElement.innerHTML='${getInitials(member.name)}'">`
                    : getInitials(member.name);
                return `
                    <div class="city-member-item" data-member='${JSON.stringify(member).replace(/'/g, "&#39;")}'>
                        <div class="city-member-avatar">${avatarContent}</div>
                        <div class="city-member-info">
                            <div class="city-member-name">${member.name}</div>
                            <div class="city-member-role">${member.role}</div>
                        </div>
                        <div class="city-member-languages">${flagsHtml}</div>
                    </div>
                `;
            }).join('');

            return `
                <div class="city-popup-content">
                    <div class="city-popup-header">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path fill-rule="evenodd" d="m11.54 22.351.07.04.028.016a.76.76 0 0 0 .723 0l.028-.015.071-.041a16.975 16.975 0 0 0 1.144-.742 19.58 19.58 0 0 0 2.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 0 0-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 0 0 3.828 3.025ZM12 11.25a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd" />
                        </svg>
                        <div class="city-popup-title">${cityData.city}</div>
                        <div class="city-popup-count">${cityData.members.length} members</div>
                    </div>
                    <div class="city-member-list">${membersHtml}</div>
                </div>
            `;
        }

        // Initialize map
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [20, 30],
            zoom: 2,
            projection: 'globe',
            antialias: true
        });

        map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

        map.on('style.load', () => {
            map.setFog({
                color: 'rgb(10, 10, 15)',
                'high-color': 'rgb(20, 20, 30)',
                'horizon-blend': 0.08,
                'space-color': 'rgb(5, 5, 10)',
                'star-intensity': 0.6
            });
        });

        // Store markers for cleanup
        let markers = [];

        // Add markers to map
        function addMarkers(teamData) {
            // Clear existing markers
            markers.forEach(m => m.remove());
            markers = [];

            // Group team members by city
            const cityGroups = {};
            teamData.forEach(member => {
                const key = `${member.lat},${member.lng}`;
                if (!cityGroups[key]) {
                    cityGroups[key] = {
                        city: member.city,
                        country: member.country,
                        lat: member.lat,
                        lng: member.lng,
                        members: []
                    };
                }
                cityGroups[key].members.push(member);
            });

            // Update stats
            const allLanguages = new Set();
            teamData.forEach(m => m.languages.forEach(l => allLanguages.add(l.toLowerCase())));
            
            document.getElementById('statMembers').textContent = teamData.length;
            document.getElementById('statCities').textContent = Object.keys(cityGroups).length;
            document.getElementById('statLanguages').textContent = allLanguages.size;

            // Create markers
            Object.values(cityGroups).forEach(cityData => {
                const el = document.createElement('div');
                
                if (cityData.members.length === 1) {
                    el.className = 'single-marker';
                } else {
                    el.className = 'cluster-marker';
                    el.style.width = `${32 + cityData.members.length * 4}px`;
                    el.style.height = `${32 + cityData.members.length * 4}px`;
                    el.textContent = cityData.members.length;
                }

                const popup = new mapboxgl.Popup({
                    offset: 25,
                    closeButton: true,
                    closeOnClick: true,
                    maxWidth: '340px'
                });

                if (cityData.members.length === 1) {
                    popup.setHTML(createMemberPopup(cityData.members[0]));
                } else {
                    popup.setHTML(createCityPopup(cityData));
                    
                    popup.on('open', () => {
                        document.querySelectorAll('.city-member-item').forEach(item => {
                            item.addEventListener('click', (e) => {
                                const memberData = JSON.parse(item.dataset.member);
                                popup.setHTML(createMemberPopup(memberData));
                            });
                        });
                    });
                }

                const marker = new mapboxgl.Marker(el)
                    .setLngLat([cityData.lng, cityData.lat])
                    .setPopup(popup)
                    .addTo(map);
                
                markers.push(marker);
            });
        }

        // Fetch and load data
        async function loadData() {
            const loadingText = document.querySelector('.loading-text');
            try {
                loadingText.textContent = 'Fetching data from Google Sheets...';
                
                // Use allorigins proxy for CORS
                const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(GOOGLE_SHEET_CSV_URL);
                const response = await fetch(proxyUrl);
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                loadingText.textContent = 'Parsing team data...';
                const csv = await response.text();
                
                // Debug: check if we got data
                console.log('CSV received, length:', csv.length);
                console.log('First 500 chars:', csv.substring(0, 500));
                
                if (!csv || csv.length < 50) {
                    throw new Error('Empty or invalid CSV response');
                }
                
                const rawData = parseCSV(csv);
                console.log('Parsed rows:', rawData.length);
                
                if (rawData.length === 0) {
                    throw new Error('No data rows found in CSV');
                }
                
                const teamData = processTeamData(rawData);
                console.log('Processed team members:', teamData.length);
                
                loadingText.textContent = 'Placing markers...';
                addMarkers(teamData);
                
                // Hide loading overlay
                document.getElementById('loadingOverlay').classList.add('hidden');
                
                // Fly to show team distribution
                setTimeout(() => {
                    map.flyTo({
                        center: [10, 45],
                        zoom: 3.5,
                        duration: 2000,
                        essential: true
                    });
                }, 500);
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loadingOverlay').innerHTML = `
                    <div class="error-message">
                        <h2>Unable to Load Data</h2>
                        <p>Check that the Google Sheet is published and accessible.</p>
                        <p style="margin-top: 12px; font-size: 12px; color: var(--text-muted);">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load data when map is ready
        map.on('load', loadData);
    </script>
</body>
</html>
