<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDE Team Global Map</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #141419;
            --bg-card-hover: #1a1a22;
            --accent-red: #eb1700;
            --accent-red-glow: rgba(235, 23, 0, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-subtle: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text { margin-top: 16px; color: var(--text-secondary); font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 24px 32px;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.95) 0%, rgba(10, 10, 15, 0) 100%);
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .header-left h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 28px; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 4px;
        }
        .header-left h1 span { color: var(--accent-red); }
        .header-left p { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .header-stats { display: flex; gap: 32px; }
        .stat { text-align: right; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

        .cluster-marker {
            background: var(--accent-red); border: 3px solid var(--bg-dark); border-radius: 50%;
            color: white; font-weight: 700; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 4px 20px var(--accent-red-glow);
            animation: pulse 2s infinite;
        }
        .cluster-marker:hover { transform: scale(1.15); }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px var(--accent-red-glow), 0 0 0 0 var(--accent-red-glow); }
            50% { box-shadow: 0 4px 20px var(--accent-red-glow), 0 0 0 8px rgba(235, 23, 0, 0); }
        }
        .single-marker {
            width: 16px; height: 16px; background: var(--accent-red);
            border: 3px solid var(--bg-dark); border-radius: 50%;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 4px 16px var(--accent-red-glow);
        }
        .single-marker:hover { transform: scale(1.4); }

        .mapboxgl-popup { max-width: 340px !important; }
        .mapboxgl-popup-content {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }
        .mapboxgl-popup-close-button { color: var(--text-muted); font-size: 20px; padding: 12px 16px; }
        .mapboxgl-popup-close-button:hover { background: transparent; color: var(--text-primary); }
        .mapboxgl-popup-tip { border-top-color: var(--bg-card) !important; }

        .popup-content { padding: 24px; }
        .popup-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .popup-avatar {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-red) 0%, #ff4d4d 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700; color: white; flex-shrink: 0;
            overflow: hidden;
        }
        .popup-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .popup-name { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
        .popup-role { font-size: 13px; color: var(--text-secondary); }
        .popup-divider { height: 1px; background: var(--border-subtle); margin: 0 -24px 20px; }
        .popup-section { margin-bottom: 16px; }
        .popup-section:last-child { margin-bottom: 0; }
        .popup-section-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; font-weight: 600; }
        .popup-location { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-primary); }
        .popup-location svg { width: 16px; height: 16px; color: var(--accent-red); }
        .popup-languages { display: flex; flex-wrap: wrap; gap: 8px; }
        .language-tag {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-subtle);
            padding: 6px 12px; border-radius: 8px; font-size: 13px; color: var(--text-primary);
        }
        .language-flag { font-size: 16px; line-height: 1; }

        .city-popup-content { padding: 20px; }
        .city-popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle); }
        .city-popup-header svg { width: 20px; height: 20px; color: var(--accent-red); }
        .city-popup-title { font-size: 16px; font-weight: 600; }
        .city-popup-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }
        .city-member-list { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; }
        .city-member-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03); border-radius: 10px;
            cursor: pointer; transition: all 0.15s ease;
        }
        .city-member-item:hover { background: rgba(255, 255, 255, 0.06); }
        .city-member-avatar {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-red) 0%, #ff4d4d 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden;
        }
        .city-member-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .city-member-info { flex: 1; min-width: 0; }
        .city-member-name { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .city-member-role { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .city-member-languages { display: flex; gap: 2px; font-size: 14px; }

        .legend {
            position: fixed; bottom: 24px; left: 24px; z-index: 100;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 12px; padding: 16px 20px; display: flex; gap: 24px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-secondary); }
        .legend-dot { width: 12px; height: 12px; background: var(--accent-red); border-radius: 50%; box-shadow: 0 2px 8px var(--accent-red-glow); }
        .legend-cluster { width: 24px; height: 24px; background: var(--accent-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }

        .city-member-list::-webkit-scrollbar { width: 6px; }
        .city-member-list::-webkit-scrollbar-track { background: transparent; }
        .city-member-list::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

        .mapboxgl-ctrl-group { background: var(--bg-card) !important; border: 1px solid var(--border-subtle) !important; border-radius: 10px !important; }
        .mapboxgl-ctrl-group button { background: var(--bg-card) !important; }
        .mapboxgl-ctrl-group button:hover { background: var(--bg-card-hover) !important; }
        .mapboxgl-ctrl-group button .mapboxgl-ctrl-icon { filter: invert(1); }

        .error-message {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-card); border: 1px solid var(--accent-red);
            border-radius: 12px; padding: 24px 32px; text-align: center; z-index: 9999;
        }
        .error-message h2 { color: var(--accent-red); margin-bottom: 8px; }
        .error-message p { color: var(--text-secondary); font-size: 14px; }

        /* Theme toggle */
        .theme-toggle {
            position: fixed; top: 24px; right: 32px; z-index: 100;
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 10px; padding: 8px 14px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .theme-toggle:hover { background: var(--bg-card-hover); }
        .theme-toggle-label { font-size: 12px; color: var(--text-secondary); }
        .theme-toggle-switch {
            width: 44px; height: 24px;
            background: var(--border-subtle); border-radius: 12px;
            position: relative; transition: background 0.3s ease;
        }
        .theme-toggle-switch::after {
            content: '☀️'; position: absolute;
            width: 20px; height: 20px; top: 2px; left: 2px;
            background: var(--bg-card); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; transition: all 0.3s ease;
        }
        .theme-toggle.light .theme-toggle-switch { background: var(--accent-red); }
        .theme-toggle.light .theme-toggle-switch::after { left: 22px; content: '🌙'; }

        /* Team roster panel */
        .roster-toggle {
            position: fixed; bottom: 24px; right: 24px; z-index: 100;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 12px; padding: 12px 16px;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 500; color: var(--text-primary);
            transition: all 0.2s ease;
        }
        .roster-toggle:hover { background: var(--bg-card-hover); }
        .roster-toggle svg { width: 18px; height: 18px; color: var(--accent-red); }

        .roster-panel {
            position: fixed; top: 0; right: -360px; bottom: 0; width: 360px;
            background: var(--bg-dark); border-left: 1px solid var(--border-subtle);
            z-index: 200; transition: right 0.3s ease;
            display: flex; flex-direction: column;
        }
        .roster-panel.open { right: 0; }
        .roster-header {
            padding: 20px; border-bottom: 1px solid var(--border-subtle);
            display: flex; align-items: center; justify-content: space-between;
        }
        .roster-title { font-size: 16px; font-weight: 600; }
        .roster-close {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--bg-card); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 18px; transition: all 0.2s;
        }
        .roster-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .roster-search {
            margin: 16px 20px; padding: 10px 14px;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 8px; color: var(--text-primary); font-size: 14px;
            outline: none; width: calc(100% - 40px);
        }
        .roster-search::placeholder { color: var(--text-muted); }
        .roster-search:focus { border-color: var(--accent-red); }
        .roster-list {
            flex: 1; overflow-y: auto; padding: 0 12px 20px;
        }
        .roster-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; margin: 4px 0; border-radius: 10px;
            cursor: pointer; transition: all 0.15s ease;
        }
        .roster-item:hover { background: var(--bg-card); }
        .roster-item-avatar {
            width: 40px; height: 40px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-red) 0%, #ff4d4d 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: white; flex-shrink: 0;
            overflow: hidden;
        }
        .roster-item-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .roster-item-info { flex: 1; min-width: 0; }
        .roster-item-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .roster-item-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .roster-item-flags { font-size: 14px; }
        .roster-count { padding: 8px 20px; font-size: 12px; color: var(--text-muted); }

        /* Light theme overrides */
        body.light-theme { --bg-dark: #f5f5f7; --bg-card: #ffffff; --bg-card-hover: #f0f0f2; --text-primary: #1a1a1a; --text-secondary: #666666; --text-muted: #999999; --border-subtle: rgba(0, 0, 0, 0.1); }
        body.light-theme .header { background: linear-gradient(180deg, rgba(245, 245, 247, 0.95) 0%, rgba(245, 245, 247, 0) 100%); }
        body.light-theme .cluster-marker { border-color: #ffffff; }
        body.light-theme .single-marker { border-color: #ffffff; }
        body.light-theme .roster-panel { background: #f5f5f7; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading team data...</div>
    </div>

    <div id="map"></div>
    
    <div class="header">
        <div class="header-left">
            <h1>Firefly <span>FDE</span> Team</h1>
            <p>Forward Deployed Engineering — EMEA, APAC & Japan</p>
        </div>
        <div class="header-stats">
            <div class="stat">
                <div class="stat-value" id="statMembers">--</div>
                <div class="stat-label">Team Members</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statCities">--</div>
                <div class="stat-label">Cities</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statLanguages">--</div>
                <div class="stat-label">Languages</div>
            </div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot"></div><span>Single member</span></div>
        <div class="legend-item"><div class="legend-cluster">3</div><span>Multiple members</span></div>
    </div>

    <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span class="theme-toggle-label">Light mode</span>
        <div class="theme-toggle-switch"></div>
    </div>

    <div class="roster-toggle" id="rosterToggle" onclick="openRoster()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path fill-rule="evenodd" d="M8.25 6.75a3.75 3.75 0 1 1 7.5 0 3.75 3.75 0 0 1-7.5 0ZM15.75 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM2.25 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM6.31 15.117A6.745 6.745 0 0 1 12 12a6.745 6.745 0 0 1 6.709 7.498.75.75 0 0 1-.372.568A12.696 12.696 0 0 1 12 21.75c-2.305 0-4.47-.612-6.337-1.684a.75.75 0 0 1-.372-.568 6.787 6.787 0 0 1 1.019-4.38Z" clip-rule="evenodd" />
            <path d="M5.082 14.254a8.287 8.287 0 0 0-1.308 5.135 9.687 9.687 0 0 1-1.764-.44l-.115-.04a.563.563 0 0 1-.373-.487l-.01-.121a3.75 3.75 0 0 1 3.57-4.047ZM20.226 19.389a8.287 8.287 0 0 0-1.308-5.135 3.75 3.75 0 0 1 3.57 4.047l-.01.121a.563.563 0 0 1-.373.486l-.115.04c-.567.2-1.156.349-1.764.441Z" />
        </svg>
        <span>Team Roster</span>
    </div>

    <div class="roster-panel" id="rosterPanel">
        <div class="roster-header">
            <span class="roster-title">Team Roster</span>
            <button class="roster-close" onclick="closeRoster()">×</button>
        </div>
        <input type="text" class="roster-search" id="rosterSearch" placeholder="Search by name, city, or language..." oninput="filterRoster()">
        <div class="roster-count" id="rosterCount">Loading...</div>
        <div class="roster-list" id="rosterList"></div>
    </div>

    <script>
        // =====================================================
        // THEME TOGGLE
        // =====================================================
        let isLightTheme = false;

        function toggleTheme() {
            isLightTheme = !isLightTheme;
            document.body.classList.toggle('light-theme', isLightTheme);
            document.getElementById('themeToggle').classList.toggle('light', isLightTheme);
            
            // Change map style
            const style = isLightTheme ? 'mapbox://styles/mapbox/light-v11' : 'mapbox://styles/mapbox/dark-v11';
            map.setStyle(style);
            
            // Re-apply fog after style change
            map.once('style.load', () => {
                if (isLightTheme) {
                    map.setFog({
                        color: 'rgb(220, 220, 225)',
                        'high-color': 'rgb(180, 200, 220)',
                        'horizon-blend': 0.05,
                        'space-color': 'rgb(200, 210, 220)',
                        'star-intensity': 0.0
                    });
                } else {
                    map.setFog({
                        color: 'rgb(10, 10, 15)',
                        'high-color': 'rgb(20, 20, 30)',
                        'horizon-blend': 0.08,
                        'space-color': 'rgb(5, 5, 10)',
                        'star-intensity': 0.6
                    });
                }
                // Re-add night layer after style change
                addNightLayer();
                // Re-add markers after style change
                if (window.currentTeamData) {
                    addMarkers(window.currentTeamData);
                }
            });
        }

        // =====================================================
        // TEAM ROSTER
        // =====================================================
        let allTeamData = [];

        function openRoster() {
            document.getElementById('rosterPanel').classList.add('open');
        }

        function closeRoster() {
            document.getElementById('rosterPanel').classList.remove('open');
        }

        function renderRoster(data) {
            const list = document.getElementById('rosterList');
            const count = document.getElementById('rosterCount');
            
            count.textContent = `${data.length} team member${data.length !== 1 ? 's' : ''}`;
            
            list.innerHTML = data.map(member => {
                const flags = member.languages.map(l => languageFlags[l.toLowerCase()] || '🌐').join('');
                const avatarContent = member.photo_url 
                    ? `<img src="${member.photo_url}" alt="${member.name}" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='${getInitials(member.name)}'">`
                    : getInitials(member.name);
                return `
                    <div class="roster-item" onclick="zoomToMember('${member.lat}', '${member.lng}', '${member.name.replace(/'/g, "\\'")}')">
                        <div class="roster-item-avatar">${avatarContent}</div>
                        <div class="roster-item-info">
                            <div class="roster-item-name">${member.name}</div>
                            <div class="roster-item-detail">${member.city} · ${member.role}</div>
                        </div>
                        <div class="roster-item-flags">${flags}</div>
                    </div>
                `;
            }).join('');
        }

        function filterRoster() {
            const query = document.getElementById('rosterSearch').value.toLowerCase();
            if (!query) {
                renderRoster(allTeamData);
                return;
            }
            const filtered = allTeamData.filter(m => 
                m.name.toLowerCase().includes(query) ||
                m.city.toLowerCase().includes(query) ||
                m.role.toLowerCase().includes(query) ||
                m.languages.some(l => l.toLowerCase().includes(query))
            );
            renderRoster(filtered);
        }

        function zoomToMember(lat, lng, name) {
            closeRoster();
            map.flyTo({
                center: [parseFloat(lng), parseFloat(lat)],
                zoom: 6,
                duration: 1500
            });
            // Find and open the marker popup
            setTimeout(() => {
                markers.forEach(marker => {
                    const markerLngLat = marker.getLngLat();
                    if (Math.abs(markerLngLat.lat - parseFloat(lat)) < 0.01 && 
                        Math.abs(markerLngLat.lng - parseFloat(lng)) < 0.01) {
                        marker.togglePopup();
                    }
                });
            }, 1600);
        }

        // =====================================================
        // CONFIGURATION - Edit these values to update the map
        // =====================================================
        
        // Your Google Sheet ID (from the URL)
        const SHEET_ID = '1mQFxLM5n_i0FOCzMYakFfAKir3yFc1V96qIegqpyp1U';
        
        // Your Mapbox token
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFvbWFsbGUiLCJhIjoiY21ueW53cGtlMDMwcTJwc2RnYWxvZXZ3ZSJ9.3vmNAjpySCnvviPHo_zArg';

        // =====================================================
        // CITY COORDINATES
        // =====================================================
        const cityCoordinates = {
            'london': { lat: 51.5074, lng: -0.1278 },
            'paris': { lat: 48.8566, lng: 2.3522 },
            'bayonne': { lat: 43.4929, lng: -1.4748 },
            'berlin': { lat: 52.5200, lng: 13.4050 },
            'frankfurt': { lat: 50.1109, lng: 8.6821 },
            'munich': { lat: 48.1351, lng: 11.5820 },
            'munster': { lat: 51.9607, lng: 7.6261 },
            'sydney': { lat: -33.8688, lng: 151.2093 },
            'tokyo': { lat: 35.6762, lng: 139.6503 },
            'osaka': { lat: 34.6937, lng: 135.5023 },
            'kyoto': { lat: 35.0116, lng: 135.7681 },
            'bucharest': { lat: 44.4268, lng: 26.1025 },
            'riyadh': { lat: 24.7136, lng: 46.6753 },
            'jeddah': { lat: 21.4858, lng: 39.1925 },
            'madrid': { lat: 40.4168, lng: -3.7038 },
            'ottawa': { lat: 45.4215, lng: -75.6972 },
            'cairo': { lat: 30.0444, lng: 31.2357 },

        // Get local time for a city
        function getLocalTime(city) {
            const cityKey = city.toLowerCase().trim();
            const timezone = cityTimezones[cityKey] || 'UTC';
            
            try {
                const now = new Date();
                const options = { 
                    timeZone: timezone, 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: false 
                };
                const timeStr = now.toLocaleTimeString('en-GB', options);
                
                // Get day info to show if it's a different day
                const dayOptions = { timeZone: timezone, weekday: 'short' };
                const dayStr = now.toLocaleDateString('en-GB', dayOptions);
                
                // Check if it's daytime (6am-6pm rough estimate)
                const hour = parseInt(timeStr.split(':')[0]);
                const isDaytime = hour >= 6 && hour < 18;
                const icon = isDaytime ? '☀️' : '🌙';
                
                return `${icon} ${timeStr} ${dayStr}`;
            } catch (e) {
                return '🕐 --:--';
            }
        }

        function loadSheetData() {
            return new Promise((resolve, reject) => {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                
                fetch(url)
                    .then(response => response.text())
                    .then(text => {
                        // Google wraps the JSON in a function call, strip it
                        const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
                        if (!jsonString || !jsonString[1]) {
                            throw new Error('Invalid response format');
                        }
                        
                        const data = JSON.parse(jsonString[1]);
                        const rows = data.table.rows;
                        const cols = data.table.cols;
                        
                        // Get column headers from first row or col labels
                        let headers = cols.map(col => (col.label || '').toLowerCase().trim());
                        
                        // If headers are empty, try to get from first row
                        if (headers.every(h => !h)) {
                            if (rows.length > 0) {
                                headers = rows[0].c.map(cell => cell ? (cell.v || '').toString().toLowerCase().trim() : '');
                                rows.shift(); // Remove header row from data
                            }
                        }
                        
                        // Parse data rows
                        const result = rows.map(row => {
                            const obj = {};
                            if (row.c) {
                                row.c.forEach((cell, i) => {
                                    const header = headers[i] || `col${i}`;
                                    obj[header] = cell ? (cell.v || '') : '';
                                });
                            }
                            return obj;
                        }).filter(row => row.name && row.name.toString().trim()); // Filter out empty rows
                        
                        console.log('Loaded', result.length, 'team members');
                        resolve(result);
                    })
                    .catch(err => {
                        console.error('Fetch error:', err);
                        reject(err);
                    });
            });
        }

        // Transform Google Drive URLs to working format
        // Old format (deprecated): https://drive.google.com/uc?export=view&id=FILE_ID
        // New format (working): https://lh3.googleusercontent.com/d/FILE_ID
        function transformPhotoUrl(url) {
            if (!url || typeof url !== 'string') return '';
            url = url.trim();
            
            // Handle the deprecated uc?export=view format
            const ucMatch = url.match(/drive\.google\.com\/uc\?.*id=([a-zA-Z0-9_-]+)/);
            if (ucMatch) {
                return `https://lh3.googleusercontent.com/d/${ucMatch[1]}`;
            }
            
            // Handle /file/d/FILE_ID/view format
            const fileMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (fileMatch) {
                return `https://lh3.googleusercontent.com/d/${fileMatch[1]}`;
            }
            
            // Handle /open?id=FILE_ID format
            const openMatch = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
            if (openMatch) {
                return `https://lh3.googleusercontent.com/d/${openMatch[1]}`;
            }
            
            // Return as-is if not a Google Drive URL (e.g., direct image hosts)
            return url;
        }

        // =====================================================
        // DAY/NIGHT TERMINATOR
        // =====================================================
        
        // Calculate sun position based on current time
        function getSunPosition() {
            const now = new Date();
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            const hour = now.getUTCHours() + now.getUTCMinutes() / 60;
            
            // Solar declination (simplified)
            const declination = -23.45 * Math.cos((360 / 365) * (dayOfYear + 10) * Math.PI / 180);
            
            // Sun longitude (opposite of UTC time converted to degrees)
            const sunLng = -((hour / 24) * 360 - 180);
            
            return { lat: declination, lng: sunLng };
        }
        
        // Generate night polygon coordinates
        function generateNightPolygon() {
            const sun = getSunPosition();
            const points = [];
            const nightPoints = [];
            
            // Generate terminator line
            for (let lng = -180; lng <= 180; lng += 2) {
                const lngRad = lng * Math.PI / 180;
                const sunLngRad = sun.lng * Math.PI / 180;
                const sunLatRad = sun.lat * Math.PI / 180;
                
                // Calculate terminator latitude at this longitude
                const hourAngle = lngRad - sunLngRad;
                const lat = Math.atan(-Math.cos(hourAngle) / Math.tan(sunLatRad)) * 180 / Math.PI;
                
                points.push([lng, lat]);
            }
            
            // Create night polygon (the side away from the sun)
            // Add terminator points
            for (let i = 0; i < points.length; i++) {
                nightPoints.push(points[i]);
            }
            
            // Close the polygon on the night side
            // Determine which pole is in darkness
            const nightPoleDirection = sun.lat > 0 ? -90 : 90;
            
            nightPoints.push([180, points[points.length - 1][1]]);
            nightPoints.push([180, nightPoleDirection]);
            nightPoints.push([-180, nightPoleDirection]);
            nightPoints.push([-180, points[0][1]]);
            nightPoints.push(points[0]);
            
            return nightPoints;
        }
        
        function addNightLayer() {
            const nightCoords = generateNightPolygon();
            
            if (map.getSource('night-source')) {
                map.getSource('night-source').setData({
                    type: 'Feature',
                    geometry: {
                        type: 'Polygon',
                        coordinates: [nightCoords]
                    }
                });
            } else {
                map.addSource('night-source', {
                    type: 'geojson',
                    data: {
                        type: 'Feature',
                        geometry: {
                            type: 'Polygon',
                            coordinates: [nightCoords]
                        }
                    }
                });
                
                map.addLayer({
                    id: 'night-layer',
                    type: 'fill',
                    source: 'night-source',
                    paint: {
                        'fill-color': '#000000',
                        'fill-opacity': 0.35
                    }
                });
            }
        }

                'star-intensity': 0.6
            });
            
            // Add night overlay
            addNightLayer();
            
            // Update every minute
            setInterval(addNightLayer, 60000);

        let markers = [];

        function addMarkers(teamData) {
            markers.forEach(m => m.remove());
            markers = [];

            const cityGroups = {};
            teamData.forEach(member => {
                const key = `${member.lat},${member.lng}`;

            });

            document.getElementById('statCities').textContent = Object.keys(cityGroups).length;

                    el.style.height = `${32 + cityData.members.length * 4}px`;
                    el.textContent = cityData.members.length;
                }

                const popup = new mapboxgl.Popup({ offset: 25, closeButton: true, maxWidth: '340px' });

                const marker = new mapboxgl.Marker(el)
                    .setLngLat([cityData.lng, cityData.lat])

                markers.push(marker);
            });
