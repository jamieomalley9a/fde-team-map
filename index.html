<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDE Team Global Map</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #141419;
            --bg-card-hover: #1a1a22;
            --accent-red: #eb1700;
            --accent-red-glow: rgba(235, 23, 0, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-subtle: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text { margin-top: 16px; color: var(--text-secondary); font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 24px 32px;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.95) 0%, rgba(10, 10, 15, 0) 100%);
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .header-left h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 28px; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 4px;
        }
        .header-left h1 span { color: var(--accent-red); }
        .header-left p { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .header-stats { display: flex; gap: 32px; }
        .stat { text-align: right; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

        .cluster-marker {
            background: var(--accent-red); border: 3px solid var(--bg-dark); border-radius: 50%;
            color: white; font-weight: 700; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 4px 20px var(--accent-red-glow);
            animation: pulse 2s infinite;
        }
        .cluster-marker:hover { transform: scale(1.15); }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px var(--accent-red-glow), 0 0 0 0 var(--accent-red-glow); }
            50% { box-shadow: 0 4px 20px var(--accent-red-glow), 0 0 0 8px rgba(235, 23, 0, 0); }
        }
        .single-marker {
            width: 16px; height: 16px; background: var(--accent-red);
            border: 3px solid var(--bg-dark); border-radius: 50%;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 4px 16px var(--accent-red-glow);
        }
        .single-marker:hover { transform: scale(1.4); }

        .mapboxgl-popup { max-width: 340px !important; }
        .mapboxgl-popup-content {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }
        .mapboxgl-popup-close-button { color: var(--text-muted); font-size: 20px; padding: 12px 16px; }
        .mapboxgl-popup-close-button:hover { background: transparent; color: var(--text-primary); }
        .mapboxgl-popup-tip { border-top-color: var(--bg-card) !important; }

        .popup-content { padding: 24px; }
        .popup-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .popup-avatar {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-red) 0%, #ff4d4d 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700; color: white; flex-shrink: 0;
            overflow: hidden;
        }
        .popup-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .popup-name { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
        .popup-role { font-size: 13px; color: var(--text-secondary); }
        .popup-divider { height: 1px; background: var(--border-subtle); margin: 0 -24px 20px; }
        .popup-section { margin-bottom: 16px; }
        .popup-section:last-child { margin-bottom: 0; }
        .popup-section-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; font-weight: 600; }
        .popup-location { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-primary); }
        .popup-location svg { width: 16px; height: 16px; color: var(--accent-red); }
        .popup-languages { display: flex; flex-wrap: wrap; gap: 8px; }
        .language-tag {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-subtle);
            padding: 6px 12px; border-radius: 8px; font-size: 13px; color: var(--text-primary);
        }
        .language-flag { font-size: 16px; line-height: 1; }

        .city-popup-content { padding: 20px; }
        .city-popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle); }
        .city-popup-header svg { width: 20px; height: 20px; color: var(--accent-red); }
        .city-popup-title { font-size: 16px; font-weight: 600; }
        .city-popup-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }
        .city-member-list { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; }
        .city-member-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03); border-radius: 10px;
            cursor: pointer; transition: all 0.15s ease;
        }
        .city-member-item:hover { background: rgba(255, 255, 255, 0.06); }
        .city-member-avatar {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-red) 0%, #ff4d4d 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden;
        }
        .city-member-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .city-member-info { flex: 1; min-width: 0; }
        .city-member-name { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .city-member-role { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .city-member-languages { display: flex; gap: 2px; font-size: 14px; }

        .legend {
            position: fixed; bottom: 24px; left: 24px; z-index: 100;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 12px; padding: 16px 20px; display: flex; gap: 24px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-secondary); }
        .legend-dot { width: 12px; height: 12px; background: var(--accent-red); border-radius: 50%; box-shadow: 0 2px 8px var(--accent-red-glow); }
        .legend-cluster { width: 24px; height: 24px; background: var(--accent-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }

        .city-member-list::-webkit-scrollbar { width: 6px; }
        .city-member-list::-webkit-scrollbar-track { background: transparent; }
        .city-member-list::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

        .mapboxgl-ctrl-group { background: var(--bg-card) !important; border: 1px solid var(--border-subtle) !important; border-radius: 10px !important; }
        .mapboxgl-ctrl-group button { background: var(--bg-card) !important; }
        .mapboxgl-ctrl-group button:hover { background: var(--bg-card-hover) !important; }
        .mapboxgl-ctrl-group button .mapboxgl-ctrl-icon { filter: invert(1); }

        .error-message {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-card); border: 1px solid var(--accent-red);
            border-radius: 12px; padding: 24px 32px; text-align: center; z-index: 9999;
        }
        .error-message h2 { color: var(--accent-red); margin-bottom: 8px; }
        .error-message p { color: var(--text-secondary); font-size: 14px; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading team data...</div>
    </div>

    <div id="map"></div>
    
    <div class="header">
        <div class="header-left">
            <h1>Firefly <span>FDE</span> Team</h1>
            <p>Forward Deployed Engineering — EMEA, APAC & Japan</p>
        </div>
        <div class="header-stats">
            <div class="stat">
                <div class="stat-value" id="statMembers">--</div>
                <div class="stat-label">Team Members</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statCities">--</div>
                <div class="stat-label">Cities</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statLanguages">--</div>
                <div class="stat-label">Languages</div>
            </div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot"></div><span>Single member</span></div>
        <div class="legend-item"><div class="legend-cluster">3</div><span>Multiple members</span></div>
    </div>

    <script>
        // =====================================================
        // CONFIGURATION - Edit these values to update the map
        // =====================================================
        
        // Your Google Sheet ID (from the URL)
        const SHEET_ID = '1mQFxLM5n_i0FOCzMYakFfAKir3yFc1V96qIegqpyp1U';
        
        // Your Mapbox token
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFvbWFsbGUiLCJhIjoiY21ueW53cGtlMDMwcTJwc2RnYWxvZXZ3ZSJ9.3vmNAjpySCnvviPHo_zArg';

        // =====================================================
        // CITY COORDINATES
        // =====================================================
        const cityCoordinates = {
            'london': { lat: 51.5074, lng: -0.1278 },
            'paris': { lat: 48.8566, lng: 2.3522 },
            'berlin': { lat: 52.5200, lng: 13.4050 },
            'munich': { lat: 48.1351, lng: 11.5820 },
            'sydney': { lat: -33.8688, lng: 151.2093 },
            'tokyo': { lat: 35.6762, lng: 139.6503 },
            'bucharest': { lat: 44.4268, lng: 26.1025 },
            'riyadh': { lat: 24.7136, lng: 46.6753 },
            'madrid': { lat: 40.4168, lng: -3.7038 },
            'ottawa': { lat: 45.4215, lng: -75.6972 },
            'cairo': { lat: 30.0444, lng: 31.2357 },
            'warsaw': { lat: 52.2297, lng: 21.0122 },
            'cardiff': { lat: 51.4816, lng: -3.1791 },
            'brussels': { lat: 50.8503, lng: 4.3517 },
            'amsterdam': { lat: 52.3676, lng: 4.9041 },
            'dubai': { lat: 25.2048, lng: 55.2708 },
            'singapore': { lat: 1.3521, lng: 103.8198 },
            'hong kong': { lat: 22.3193, lng: 114.1694 },
            'melbourne': { lat: -37.8136, lng: 144.9631 },
            'toronto': { lat: 43.6532, lng: -79.3832 },
            'new york': { lat: 40.7128, lng: -74.0060 },
            'san francisco': { lat: 37.7749, lng: -122.4194 },
            'dublin': { lat: 53.3498, lng: -6.2603 },
            'prague': { lat: 50.0755, lng: 14.4378 },
            'vienna': { lat: 48.2082, lng: 16.3738 },
            'zurich': { lat: 47.3769, lng: 8.5417 },
            'stockholm': { lat: 59.3293, lng: 18.0686 },
            'copenhagen': { lat: 55.6761, lng: 12.5683 },
            'lisbon': { lat: 38.7223, lng: -9.1393 },
            'barcelona': { lat: 41.3851, lng: 2.1734 },
            'rome': { lat: 41.9028, lng: 12.4964 },
            'milan': { lat: 45.4642, lng: 9.1900 }
        };

        const languageFlags = {
            'english': '🇬🇧', 'french': '🇫🇷', 'german': '🇩🇪', 'spanish': '🇪🇸',
            'japanese': '🇯🇵', 'arabic': '🇸🇦', 'romanian': '🇷🇴', 'polish': '🇵🇱',
            'dutch': '🇳🇱', 'italian': '🇮🇹', 'portuguese': '🇵🇹', 'russian': '🇷🇺',
            'chinese': '🇨🇳', 'mandarin': '🇨🇳', 'korean': '🇰🇷', 'hindi': '🇮🇳',
            'turkish': '🇹🇷', 'greek': '🇬🇷', 'czech': '🇨🇿', 'hungarian': '🇭🇺',
            'hebrew': '🇮🇱', 'thai': '🇹🇭', 'vietnamese': '🇻🇳'
        };

        // =====================================================
        // DATA LOADING VIA GOOGLE SHEETS API (no CORS issues)
        // =====================================================
        
        function loadSheetData() {
            return new Promise((resolve, reject) => {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                
                fetch(url)
                    .then(response => response.text())
                    .then(text => {
                        // Google wraps the JSON in a function call, strip it
                        const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
                        if (!jsonString || !jsonString[1]) {
                            throw new Error('Invalid response format');
                        }
                        
                        const data = JSON.parse(jsonString[1]);
                        const rows = data.table.rows;
                        const cols = data.table.cols;
                        
                        // Get column headers from first row or col labels
                        let headers = cols.map(col => (col.label || '').toLowerCase().trim());
                        
                        // If headers are empty, try to get from first row
                        if (headers.every(h => !h)) {
                            if (rows.length > 0) {
                                headers = rows[0].c.map(cell => cell ? (cell.v || '').toString().toLowerCase().trim() : '');
                                rows.shift(); // Remove header row from data
                            }
                        }
                        
                        // Parse data rows
                        const result = rows.map(row => {
                            const obj = {};
                            if (row.c) {
                                row.c.forEach((cell, i) => {
                                    const header = headers[i] || `col${i}`;
                                    obj[header] = cell ? (cell.v || '') : '';
                                });
                            }
                            return obj;
                        }).filter(row => row.name && row.name.toString().trim()); // Filter out empty rows
                        
                        console.log('Loaded', result.length, 'team members');
                        resolve(result);
                    })
                    .catch(err => {
                        console.error('Fetch error:', err);
                        reject(err);
                    });
            });
        }

        function processTeamData(rawData) {
            return rawData.map(row => {
                const cityKey = (row.city || '').toLowerCase().trim();
                const coords = cityCoordinates[cityKey] || { lat: 51.5074, lng: -0.1278 };
                const languages = (row.languages || 'English').split(',').map(l => l.trim()).filter(l => l);
                
                return {
                    name: row.name || 'Unknown',
                    role: row.role || 'Team Member',
                    city: row.city || 'London',
                    country: row.country || 'United Kingdom',
                    languages: languages,
                    photo_url: row.photo_url || '',
                    lat: coords.lat,
                    lng: coords.lng
                };
            });
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
        }

        function createMemberPopup(member) {
            const languagesHtml = member.languages.map(lang => {
                const flag = languageFlags[lang.toLowerCase()] || '🌐';
                return `<div class="language-tag"><span class="language-flag">${flag}</span>${lang}</div>`;
            }).join('');

            const avatarContent = member.photo_url 
                ? `<img src="${member.photo_url}" alt="${member.name}" onerror="this.parentElement.innerHTML='${getInitials(member.name)}'">`
                : getInitials(member.name);

            return `
                <div class="popup-content">
                    <div class="popup-header">
                        <div class="popup-avatar">${avatarContent}</div>
                        <div>
                            <div class="popup-name">${member.name}</div>
                            <div class="popup-role">${member.role}</div>
                        </div>
                    </div>
                    <div class="popup-divider"></div>
                    <div class="popup-section">
                        <div class="popup-section-label">Location</div>
                        <div class="popup-location">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path fill-rule="evenodd" d="m11.54 22.351.07.04.028.016a.76.76 0 0 0 .723 0l.028-.015.071-.041a16.975 16.975 0 0 0 1.144-.742 19.58 19.58 0 0 0 2.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 0 0-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 0 0 3.828 3.025ZM12 11.25a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd" />
                            </svg>
                            ${member.city}, ${member.country}
                        </div>
                    </div>
                    <div class="popup-section">
                        <div class="popup-section-label">Languages</div>
                        <div class="popup-languages">${languagesHtml}</div>
                    </div>
                </div>`;
        }

        function createCityPopup(cityData) {
            const membersHtml = cityData.members.map(member => {
                const flagsHtml = member.languages.map(lang => languageFlags[lang.toLowerCase()] || '🌐').join('');
                const avatarContent = member.photo_url 
                    ? `<img src="${member.photo_url}" alt="${member.name}" onerror="this.parentElement.innerHTML='${getInitials(member.name)}'">`
                    : getInitials(member.name);
                return `
                    <div class="city-member-item" data-member='${JSON.stringify(member).replace(/'/g, "&#39;")}'>
                        <div class="city-member-avatar">${avatarContent}</div>
                        <div class="city-member-info">
                            <div class="city-member-name">${member.name}</div>
                            <div class="city-member-role">${member.role}</div>
                        </div>
                        <div class="city-member-languages">${flagsHtml}</div>
                    </div>`;
            }).join('');

            return `
                <div class="city-popup-content">
                    <div class="city-popup-header">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path fill-rule="evenodd" d="m11.54 22.351.07.04.028.016a.76.76 0 0 0 .723 0l.028-.015.071-.041a16.975 16.975 0 0 0 1.144-.742 19.58 19.58 0 0 0 2.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 0 0-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 0 0 3.828 3.025ZM12 11.25a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd" />
                        </svg>
                        <div class="city-popup-title">${cityData.city}</div>
                        <div class="city-popup-count">${cityData.members.length} members</div>
                    </div>
                    <div class="city-member-list">${membersHtml}</div>
                </div>`;
        }

        // Initialize map
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [20, 30],
            zoom: 2,
            projection: 'globe'
        });

        map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

        map.on('style.load', () => {
            map.setFog({
                color: 'rgb(10, 10, 15)',
                'high-color': 'rgb(20, 20, 30)',
                'horizon-blend': 0.08,
                'space-color': 'rgb(5, 5, 10)',
                'star-intensity': 0.6
            });
        });

        let markers = [];

        function addMarkers(teamData) {
            markers.forEach(m => m.remove());
            markers = [];

            const cityGroups = {};
            teamData.forEach(member => {
                const key = `${member.lat},${member.lng}`;
                if (!cityGroups[key]) {
                    cityGroups[key] = { city: member.city, country: member.country, lat: member.lat, lng: member.lng, members: [] };
                }
                cityGroups[key].members.push(member);
            });

            const allLanguages = new Set();
            teamData.forEach(m => m.languages.forEach(l => allLanguages.add(l.toLowerCase())));
            
            document.getElementById('statMembers').textContent = teamData.length;
            document.getElementById('statCities').textContent = Object.keys(cityGroups).length;
            document.getElementById('statLanguages').textContent = allLanguages.size;

            Object.values(cityGroups).forEach(cityData => {
                const el = document.createElement('div');
                
                if (cityData.members.length === 1) {
                    el.className = 'single-marker';
                } else {
                    el.className = 'cluster-marker';
                    el.style.width = `${32 + cityData.members.length * 4}px`;
                    el.style.height = `${32 + cityData.members.length * 4}px`;
                    el.textContent = cityData.members.length;
                }

                const popup = new mapboxgl.Popup({ offset: 25, closeButton: true, maxWidth: '340px' });

                if (cityData.members.length === 1) {
                    popup.setHTML(createMemberPopup(cityData.members[0]));
                } else {
                    popup.setHTML(createCityPopup(cityData));
                    popup.on('open', () => {
                        document.querySelectorAll('.city-member-item').forEach(item => {
                            item.addEventListener('click', () => {
                                const memberData = JSON.parse(item.dataset.member);
                                popup.setHTML(createMemberPopup(memberData));
                            });
                        });
                    });
                }

                const marker = new mapboxgl.Marker(el)
                    .setLngLat([cityData.lng, cityData.lat])
                    .setPopup(popup)
                    .addTo(map);
                markers.push(marker);
            });
        }

        // Load and display data
        map.on('load', async () => {
            try {
                document.querySelector('.loading-text').textContent = 'Fetching team data...';
                const rawData = await loadSheetData();
                
                document.querySelector('.loading-text').textContent = 'Processing...';
                const teamData = processTeamData(rawData);
                
                addMarkers(teamData);
                document.getElementById('loadingOverlay').classList.add('hidden');
                
                setTimeout(() => {
                    map.flyTo({ center: [10, 45], zoom: 3.5, duration: 2000 });
                }, 500);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingOverlay').innerHTML = `
                    <div class="error-message">
                        <h2>Unable to Load Data</h2>
                        <p>Check that the Google Sheet is shared publicly.</p>
                        <p style="margin-top:12px;font-size:12px;color:var(--text-muted);">${error.message}</p>
                    </div>`;
            }
        });
    </script>
</body>
</html>
